services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: discord_clone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Simple Backend Server
  backend:
    build:
      context: ./simple-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - JWT_EXPIRES_IN=7d
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/discord_clone
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=discord_clone
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres123
      # Groq API configuration. Leave GROQ_API_KEY empty to use the branch's
      # non-fatal placeholder responses until a real key is provided.
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_BASE_URL=${GROQ_BASE_URL:-https://api.groq.com}
      - GROQ_MODEL_SUMMARY=${GROQ_MODEL_SUMMARY:-llama-3.3-70b-versatile}
      - GROQ_MODEL_PREVIEW=${GROQ_MODEL_PREVIEW:-llama-3.1-8b-instant}
    volumes:
      - ./simple-server:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend (existing)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_WS_URL=ws://localhost:3001/ws
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend

volumes:
  postgres_data:
