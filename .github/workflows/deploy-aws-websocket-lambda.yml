name: Deploy websocket Lambda to AWS

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy-websocket-lambda:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simple-server

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: simple-server/package-lock.json

      - name: Install dependencies (includes archiver for packaging)
        run: npm ci

      - name: Package Lambda bundle
        run: npm run package:lambda

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update websocket Lambda function code
        run: >
          aws lambda update-function-code
          --function-name ${{ secrets.WS_LAMBDA_FUNCTION_NAME }}
          --zip-file fileb://lambda-deploy.zip
