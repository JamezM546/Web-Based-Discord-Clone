# P6: package Express Lambda handler and upload to AWS (configure repo secrets first).
name: Deploy backend to AWS Lambda

on:
  push:
    branches:
      - deployed
  workflow_dispatch:

jobs:
  test-backend:
    name: Run backend CI before deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: discord_clone
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRES_IN: 7d
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      DATABASE_NAME: discord_clone
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres123
      DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/discord_clone

    defaults:
      run:
        working-directory: simple-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: simple-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend test suite
        run: npm run test:coverage

      - name: Run integration test suite
        run: npm run test:integration

  deploy-lambda:
    name: Package and deploy backend
    runs-on: ubuntu-latest
    needs:
      - test-backend
    defaults:
      run:
        working-directory: simple-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: simple-server/package-lock.json

      - name: Install dependencies (includes archiver for packaging)
        run: npm ci

      - name: Package Lambda bundle
        run: npm run package:lambda

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update Lambda function code
        run: >
          aws lambda update-function-code
          --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}
          --zip-file fileb://lambda-deploy.zip
