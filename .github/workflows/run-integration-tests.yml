# P6: run integration tests on every push / PR (paths that span client ↔ API ↔ DB).
name: Run integration tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: discord_clone
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRES_IN: 7d
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      DATABASE_NAME: discord_clone
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres123
      DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/discord_clone
      # Optional secret for cloud integration tests.
      # If unset, deployed-api.integration.test.js skips cloud-only checks automatically.
      INTEGRATION_TEST_API_URL: ${{ secrets.INTEGRATION_TEST_API_URL }}

    defaults:
      run:
        working-directory: simple-server

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: simple-server/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run integration test suite
        run: npm run test:integration
