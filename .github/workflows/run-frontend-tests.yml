# Continuous integration for src/app/services/apiService.ts (Vitest: src/tests/apiService.test.ts).
# Separate from teammates' broader frontend/backend workflows to avoid duplicate runs.
name: Run Frontend Tests

on:
  push:
  pull_request:

jobs:
  vitest-api-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run apiService unit tests
        run: npm run test:api-service
