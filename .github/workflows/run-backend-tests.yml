name: Run backend tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: discord_clone
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRES_IN: 7d
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      DATABASE_NAME: discord_clone
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres123
      DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/discord_clone

    defaults:
      run:
        working-directory: simple-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: simple-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest (integration + unit) with coverage
        run: npm run test:coverage
